apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-management-app
  labels:
    app: project-management-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-management-app
  template:
    metadata:
      labels:
        app: project-management-app
    spec:
      containers:
        - name: project-management-app
          image: ghcr.io/example/project-management-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: rahti
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75"
          envFrom:
            - secretRef:
                name: project-management-app-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
