name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_NAME: project-management-app

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_NAME}"
          IMAGE_TAG="staging-${GITHUB_SHA}"
          IMAGE_REF="${IMAGE_REPO}:${IMAGE_TAG}"

          docker build -t "${IMAGE_REF}" .
          docker push "${IMAGE_REF}"

          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1

      - name: Login to OpenShift
        shell: bash
        run: |
          oc login "${{ secrets.OPENSHIFT_SERVER }}" --token="${{ secrets.OPENSHIFT_TOKEN }}" --insecure-skip-tls-verify=true

      - name: Make scripts executable
        run: chmod +x ops/openshift/*.sh

      - name: Deploy
        run: ops/openshift/deploy.sh "${{ secrets.OPENSHIFT_NAMESPACE_STAGING }}" "${{ needs.build-and-push.outputs.image_ref }}" "${{ env.APP_NAME }}"

      - name: Verify rollout and health
        run: ops/openshift/verify-rollout.sh "${{ secrets.OPENSHIFT_NAMESPACE_STAGING }}" "${{ env.APP_NAME }}"
