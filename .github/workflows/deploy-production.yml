name: Deploy Production

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional existing image tag to deploy"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  APP_NAME: project-management-app

jobs:
  build-and-push:
    name: Build and Push Release Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_NAME}"
          TAG_FROM_REF="${GITHUB_REF_NAME}"
          IMAGE_REF="${IMAGE_REPO}:${TAG_FROM_REF}"

          docker build -t "${IMAGE_REF}" .
          docker push "${IMAGE_REF}"

          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

  deploy-production:
    name: Deploy to Production (Approval Gate)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always() && (github.event_name == 'workflow_dispatch' || needs.build-and-push.result == 'success')
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image to deploy
        id: resolved
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_NAME}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.image_tag }}" ]; then
              IMAGE_REF="${IMAGE_REPO}:${{ inputs.image_tag }}"
            else
              echo "image_tag input is required when running workflow_dispatch" >&2
              exit 1
            fi
          else
            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}"
          fi

          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1

      - name: Login to OpenShift
        shell: bash
        run: |
          oc login "${{ secrets.OPENSHIFT_SERVER }}" --token="${{ secrets.OPENSHIFT_TOKEN }}" --insecure-skip-tls-verify=true

      - name: Make scripts executable
        run: chmod +x ops/openshift/*.sh

      - name: Deploy
        run: ops/openshift/deploy.sh "${{ secrets.OPENSHIFT_NAMESPACE_PRODUCTION }}" "${{ steps.resolved.outputs.image_ref }}" "${{ env.APP_NAME }}"

      - name: Verify rollout and health
        run: ops/openshift/verify-rollout.sh "${{ secrets.OPENSHIFT_NAMESPACE_PRODUCTION }}" "${{ env.APP_NAME }}"
