name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-and-security:
    name: Build, Test, and Security Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test (quality gate)
        run: mvn -B -f project-management-app/pom.xml clean verify

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: dependency-check-${{ runner.os }}-v1

      - name: OWASP Dependency-Check (fail on CVSS >= 7)
        run: |
          mkdir -p reports
          NVD_ARGS=""
          if [ -n "${{ secrets.NVD_API_KEY }}" ]; then
            NVD_ARGS="--nvdApiKey ${{ secrets.NVD_API_KEY }}"
          fi
          for attempt in 1 2 3; do
            echo "Pulling owasp/dependency-check image (attempt ${attempt}/3)..."
            if timeout 300 docker pull owasp/dependency-check:latest; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Docker image pull failed after 3 attempts."
              exit 1
            fi
          done
          docker run --rm \
            --pull never \
            -u "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -v "$HOME/.dependency-check:/usr/share/dependency-check/data" \
            owasp/dependency-check:latest \
            --scan /src/project-management-app \
            --format HTML \
            --out /src/reports \
            $NVD_ARGS \
            --failOnCVSS 7

      - name: Build container image for scan
        run: docker build -t project-management-app:pr-${{ github.sha }} .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy container scan (fail on HIGH/CRITICAL)
        run: |
          trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 project-management-app:pr-${{ github.sha }}

      - name: Upload security report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports
          if-no-files-found: warn
